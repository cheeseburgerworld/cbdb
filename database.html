<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database — CB⚡DB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── CONTRAST TOKENS (Anthropic-style dark, all solid hex) ──
ground #1a1815 · surface #211e1a · raised #2a2620 · border #38332b
text #F5F4F2 (AAA) · text-2 #C3BDB2 (AA) · text-3 #948D80 (meta only)
amber #FF9D2E · green #4ADE52 · bsky #3B9AF8 — accents, not body text */
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body { background:#1a1815; color:#F5F4F2; font-family:'IBM Plex Mono',monospace; line-height:1.6; -webkit-font-smoothing:antialiased; }
/* Top nav */
.nav { position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
background:#211e1a; border-bottom:2px solid #FF9D2E; padding:12px 20px; }
.nav-left { display:flex; align-items:center; gap:22px; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:2px; color:#F5F4F2; line-height:1; }
.logo .bolt { color:#4ADE52; }
.tabs { display:flex; gap:4px; }
.tab { font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.5px; text-transform:uppercase;
color:#F5F4F2; background:none; border:1px solid transparent; padding:8px 14px; cursor:pointer; }
.tab:hover { color:#F5F4F2; }
.tab.active { color:#15130f; background:#FF9D2E; font-weight:600; }
.nav-id { font-size:12px; color:#C3BDB2; display:flex; align-items:center; gap:8px; cursor:pointer; }
.nav-id .dot { width:8px; height:8px; border-radius:50%; background:#4ADE52; flex-shrink:0; }
.nav-id .dot.out { background:#948D80; }
/* ── DATABASE CARD VIEW ── */
.db-wrap { max-width:1100px; margin:0 auto; padding:34px 20px 90px; }
.db-bar { margin-bottom:24px; }
.eyebrow { font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#4ADE52; margin-bottom:12px; display:flex; align-items:center; gap:9px; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#4ADE52; flex-shrink:0; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow:0 0 0 0 rgba(74,222,82,.5); } 50% { box-shadow:0 0 0 6px rgba(74,222,82,0); } }
.db-title { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:1.5px; color:#FF9D2E; line-height:1; margin-bottom:18px; }
.db-filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.filter-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#948D80; margin-right:2px; }
.chip { font-family:'IBM Plex Mono',monospace; font-size:12px; color:#C3BDB2; background:#211e1a; border:1px solid #38332b; padding:7px 12px; cursor:pointer; transition:border-color .12s, color .12s; }
.chip:hover { border-color:#FF9D2E; color:#F5F4F2; }
.chip.active { background:#FF9D2E; color:#15130f; border-color:#FF9D2E; font-weight:600; }
.filter-sep { width:1px; height:22px; background:#38332b; flex-shrink:0; }
.filter-block { margin-top:10px; }
.result-count { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#948D80; margin:22px 0 16px; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:18px; }
.card { background:#211e1a; border:1px solid #38332b; overflow:hidden; transition:transform .12s, border-color .12s; display:flex; flex-direction:column; }
.card:hover { transform:translateY(-3px); border-color:#FF9D2E; }
.card-img { width:100%; aspect-ratio:4/3; background:#16140f; background-size:cover; background-position:center; position:relative; display:flex; align-items:center; justify-content:center; font-size:46px; }
.card-rating { position:absolute; top:10px; left:10px; font-size:13px; padding:4px 9px; background:rgba(22,20,15,0.92); border:1px solid; font-family:'Bebas Neue',sans-serif; letter-spacing:1px; }
.card-body { padding:15px 16px 17px; flex:1; display:flex; flex-direction:column; }
.card-name { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.5px; color:#F5F4F2; line-height:1.05; }
.card-loc { font-size:12px; color:#C3BDB2; margin:3px 0 10px; }
.card-meta { display:flex; gap:10px; align-items:center; margin-bottom:11px; }
.card-tier { font-size:13px; color:#4ADE52; font-weight:600; }
.card-style { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#C3BDB2; border:1px solid #38332b; padding:2px 7px; }
.card-snippet { font-size:13px; color:#E4DFD6; line-height:1.55; flex:1; }
.card-foot { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:13px; padding-top:11px; border-top:1px solid #2a2620; font-size:11px; }
.card-handle { color:#4ADE52; text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.card-handle:hover { text-decoration:underline; }
.card-price { color:#948D80; border:1px solid #38332b; padding:2px 7px; font-size:10px; letter-spacing:1px; flex-shrink:0; }
.card-date { color:#948D80; flex-shrink:0; }
/* States */
.state { grid-column:1 / -1; padding:70px 20px; text-align:center; }
.state-icon { font-size:42px; margin-bottom:16px; line-height:1; }
.state-title { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1.5px; color:#FF9D2E; margin-bottom:8px; }
.state-body { font-size:13px; line-height:1.8; color:#948D80; }
.state-body a { color:#FF9D2E; text-decoration:none; }
.state-body a:hover { text-decoration:underline; }
.spinner { grid-column:1 / -1; display:flex; flex-direction:column; align-items:center; gap:16px; padding:70px 20px; font-size:12px; letter-spacing:1.5px; color:#948D80; }
.spinner-ring { width:32px; height:32px; border:2px solid #38332b; border-top-color:#FF9D2E; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
/* ── PROFILE DRAWER (shared) ── */
.drawer-bg { display:none; position:fixed; inset:0; background:rgba(8,6,3,0.7); z-index:90; }
.drawer-bg.show { display:block; }
.drawer { position:fixed; top:0; right:-420px; width:400px; max-width:90vw; height:100%; background:#211e1a; border-left:2px solid #FF9D2E; z-index:95; transition:right .25s; overflow-y:auto; padding:24px 30px; }
.drawer.show { right:0; }
.drawer-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px; }
.drawer-id { display:flex; gap:13px; align-items:center; }
.rank-badge { width:34px; height:34px; border-radius:6px; background:#16140f; border:1px solid #38332b; display:flex; align-items:center; justify-content:center; font-size:18px; line-height:1; flex-shrink:0; }
.p-name { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.5px; color:#F5F4F2; }
.p-handle { font-size:12px; color:#948D80; }
.drawer-x { background:none; border:none; color:#C3BDB2; font-size:26px; cursor:pointer; line-height:1; }
.p-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
.p-stat { background:#16140f; border:1px solid #38332b; padding:14px 8px; text-align:center; }
.p-num { font-family:'Bebas Neue',sans-serif; font-size:30px; color:#F5F4F2; line-height:1; }
.p-lab { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#C3BDB2; margin-top:6px; }
.p-next { background:#1d2417; border:1px solid #38332b; padding:12px 14px; font-size:12px; color:#C3BDB2; line-height:1.5; margin-bottom:20px; }
.p-next b { color:#4ADE52; }
.p-hist-label { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#948D80; margin-bottom:10px; }
.p-history .ph-item { padding:11px 0; border-bottom:1px solid #2a2620; }
.ph-top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
.ph-name { font-size:14px; color:#F5F4F2; }
.ph-rating { font-size:12px; flex-shrink:0; }
.ph-loc { font-size:11px; color:#948D80; margin-top:2px; }
.p-empty { font-size:13px; color:#948D80; padding:20px 0; text-align:center; line-height:1.6; }
/* ── FOOTER ── */
.site-footer { border-top:1px solid #38332b; background:#211e1a; margin-top:40px; padding:22px 20px; }
.footer-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.footer-links { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.footer-links a { font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.5px; color:#C3BDB2; text-decoration:none; }
.footer-links a:hover { color:#FF9D2E; }
.footer-links a.active { color:#FF9D2E; }
.footer-copy { font-size:11px; color:#948D80; }
a.logo { text-decoration:none; }
a.tab { text-decoration:none; display:inline-block; }
@media (max-width:760px) {
.nav { gap:12px; }
.nav-left { gap:14px; min-width:0; flex:1; }
.tabs { overflow-x:auto; -webkit-overflow-scrolling:touch; gap:2px; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex:0 0 auto; white-space:nowrap; padding:8px 11px; }
.nav-id { flex-shrink:0; font-size:11px; }
.footer-inner { flex-direction:column; align-items:flex-start; gap:14px; }
.card-grid { grid-template-columns:1fr; }
.drawer { width:100%; max-width:100%; }
}
@media (min-width:761px) and (max-width:1100px){
.card-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="nav">
<div class="nav-left">
<a class="logo" href="index.html">CB<span class="bolt">⚡</span>DB</a>
<div class="tabs">
<a class="tab active" href="database.html">Database</a>
<a class="tab" href="map.html">Map</a>
<a class="tab" href="submit.html">Post a Review</a>
</div>
</div>
<div class="nav-id" id="navId" onclick="openProfile()"><span class="dot out"></span>Not signed in</div>
</div>

<div class="db-wrap">
<div class="db-bar">
<div class="eyebrow"><span class="live-dot"></span>Live index · #CBDB on Bluesky</div>
<div class="db-title">The Database</div>
<div class="db-filters">
<span class="filter-label">Rating</span>
<button class="chip active" id="fAll" onclick="setFilter('all',this)">All</button>
<button class="chip" onclick="setFilter('3',this)">Legendary</button>
<button class="chip" onclick="setFilter('2',this)">Worth A Trip</button>
<button class="chip" onclick="setFilter('1',this)">Solid</button>
<button class="chip" onclick="setFilter('0',this)">Skip It</button>
<div class="filter-sep"></div>
<button class="chip" id="yearBtn" onclick="toggleYear(this)">Last Year</button>
</div>
<div class="db-filters filter-block">
<span class="filter-label">City</span>
<div id="cityFilters" style="display:flex; gap:8px; flex-wrap:wrap;">
<button class="chip active" onclick="setCity('all',this)">All Cities</button>
</div>
</div>
</div>
<div class="result-count" id="count"></div>
<div class="card-grid" id="grid">
<div class="spinner"><div class="spinner-ring"></div>Loading…</div>
</div>
</div>

<!-- PROFILE DRAWER (shared) -->
<div class="drawer-bg" id="drawerBg" onclick="closeProfile()"></div>
<div class="drawer" id="drawer">
<div class="drawer-head">
<div class="drawer-id">
<div class="rank-badge" id="pBadge" style="display:none;">⚡</div>
<div><div class="p-name" id="pName">—</div><div class="p-handle" id="pHandle">—</div></div>
</div>
<button class="drawer-x" onclick="closeProfile()">×</button>
</div>
<div class="p-stats">
<div class="p-stat"><div class="p-num" id="pCount">0</div><div class="p-lab">Reviews</div></div>
<div class="p-stat"><div class="p-num" id="pRank">—</div><div class="p-lab">Rank</div></div>
<div class="p-stat"><div class="p-num" id="pCities">0</div><div class="p-lab">Cities</div></div>
</div>
<div class="p-next" id="pNext"></div>
<div class="p-hist-label">Your reviews</div>
<div class="p-history" id="pHistory"></div>
</div>

<script src="cbdb-config.js"></script>
<script type="module" src="auth.js"></script>
<script src="auth-bridge.js"></script>
<script>
// ── Shared session (paint handled by auth-bridge.js across all pages) ──
const state = (window.__cbdb_state = window.__cbdb_state || {signedIn:false,handle:null,displayName:null});

// ── Profile drawer (shared) ──
// Ranks climb by approved-review count. Each earned tier carries an emoji badge —
// building the burger as you climb: 🥬 → 🧀 → 🍔 → ⚡ (the CB⚡DB bolt at the top).
const RANKS=[
{min:0,name:'Guest'},
{min:1,name:'Reviewer',badge:'🥬'},
{min:10,name:'Regular',badge:'🧀'},
{min:25,name:'Contributor',badge:'🍔'},
{min:50,name:'Burger Master',badge:'⚡'}
];
function rankFor(n){ let r=RANKS[0]; for(const x of RANKS) if(n>=x.min) r=x; return r; }
function nextRank(n){ for(const x of RANKS) if(n<x.min) return x; return null; }
function openProfile(){
if(!state.signedIn){ window.location.href='submit.html'; return; }
const mine=(typeof reviews!=='undefined'?reviews:[]).filter(r=>r.by===state.handle);
const cities=new Set(mine.map(r=>r.loc)).size;
const rk=rankFor(mine.length);
const badgeEl=document.getElementById('pBadge');
if(badgeEl){
if(rk.badge){ badgeEl.style.display='flex'; badgeEl.textContent=rk.badge; badgeEl.title=rk.name; }
else { badgeEl.style.display='none'; }
}
document.getElementById('pName').textContent=state.displayName;
document.getElementById('pHandle').textContent='@'+state.handle;
document.getElementById('pCount').textContent=mine.length;
document.getElementById('pRank').textContent=rk.name;
document.getElementById('pCities').textContent=cities;
const nx=nextRank(mine.length);
document.getElementById('pNext').innerHTML = nx
? 'Next: <b>'+nx.name+'</b> at '+nx.min+' reviews. '+(nx.min-mine.length)+' to go.'
: 'Top rank reached. <b>Burger Master.</b>';
const hist=document.getElementById('pHistory');
hist.innerHTML = mine.length ? mine.map(r=>{
const rt=RATING[r.rating];
return '<div class="ph-item"><div class="ph-top"><span class="ph-name">'+r.name+'</span><span class="ph-rating" style="color:'+rt.color+'">'+rt.glyph+'</span></div><div class="ph-loc">'+r.loc+' · '+r.tier+'</div></div>';
}).join('') : '<div class="p-empty">No reviews yet.<br>Post your first one to start climbing the leaderboard.</div>';
document.getElementById('drawerBg').classList.add('show');
document.getElementById('drawer').classList.add('show');
}
function closeProfile(){
document.getElementById('drawerBg').classList.remove('show');
document.getElementById('drawer').classList.remove('show');
}

// ── Database feed (this page's own Bluesky index; kept separate from the
//    drawer's cbdb-config `reviews`/`loadReviews` to avoid clobbering them) ──
const APPROVED = new Set([
'cheeseburger.world',
'ash.cheeseburger.world',
'ratbrigade.bsky.social',
'alleyhector.bsky.social',
'burgernotomato.bsky.social',
'hacer.bsky.social',
// add more approved handles here as the program grows
]);
const BSKY_API = 'https://public.api.bsky.app/xrpc';
const FETCH_LIMIT = 100;
// num -> rating key, for color + glyph (new palette; skip = patty brown #6B4A2F)
const RATING_BY_NUM = { 3:'legendary', 2:'trip', 1:'solid', 0:'skip' };
const LABEL = { 3:'⭐⭐⭐', 2:'⭐⭐', 1:'⭐', 0:'ㄨ' };
const TIER_LABEL = { 3:'Legendary', 2:'Worth A Trip', 1:'Solid', 0:'Skip It' };

let ALL_REVIEWS = [];
let activeFilter = 'all';
let yearOnly = false;
let activeCity = 'all';

async function loadDatabaseFeed() {
ALL_REVIEWS = [];
const errors = [];
await Promise.all([...APPROVED].map(async handle => {
try {
const url = `${BSKY_API}/app.bsky.feed.getAuthorFeed?actor=${encodeURIComponent(handle)}&limit=${FETCH_LIMIT}&filter=posts_no_replies`;
const res = await fetch(url);
if (!res.ok) throw new Error(`HTTP ${res.status} for ${handle}`);
const data = await res.json();
for (const item of (data.feed || [])) {
const post = item.post;
if (!post) continue;
const text = post.record?.text || '';
if (!/#CBDB/i.test(text)) continue;
const parsed = parsePost(text);
if (!parsed) continue;
ALL_REVIEWS.push({
restaurant: parsed.restaurant,
location: parsed.location,
r: parsed.ratingNum,
price: parsed.price,
notes: parsed.reviewText,
style: parsed.style,
handle: post.author?.handle || handle,
date: formatDate(post.record?.createdAt),
imageUrl: extractImage(post),
postUrl: buildPostUrl(post.author?.handle || handle, post.uri),
_ts: post.record?.createdAt || '',
});
}
} catch(err) {
errors.push(err);
console.warn(`Failed to fetch feed for ${handle}:`, err);
}
}));
ALL_REVIEWS.sort((a, b) => b._ts.localeCompare(a._ts));
buildCityFilters();
if (ALL_REVIEWS.length === 0 && errors.length === APPROVED.size) {
showError(errors[0]); return;
}
renderFiltered();
}

function parsePost(text) {
if (!text || !/#CBDB/i.test(text)) return null;
const lines = text.replace(/\r/g, '').split('\n');
if (lines.length < 6) return null;
const restaurant = lines[0].trim();
const location = lines[1].trim();
const ratingLine = lines[2].trim();
const priceLine = lines[3].trim();
if (!restaurant || restaurant.startsWith('#')) return null;
if (!location || !location.includes(',')) return null;
const rating = parseRating(ratingLine);
if (!rating) return null;
const price = (priceLine.match(/^(\${1,3})/) || [])[1] || '';
const afterMeta = lines.slice(4);
const reviewLines = [];
let inReview = false;
for (const line of afterMeta) {
const t = line.trim();
if (/^#CBDB/i.test(t)) break;
if (!inReview && t === '') continue;
inReview = true;
if (t === '') break;
reviewLines.push(line);
}
const reviewText = reviewLines.join('\n').trim();
if (!reviewText) return null;
return { restaurant, location, ratingNum: rating.num, ratingLabel: rating.label, price, style:'', reviewText };
}

function parseRating(line) {
const stars = (line.match(/⭐/g) || []).length;
const skip = stars === 0 && /^[ㄨ✗Xx]/.test(line);
if (skip) return { num: 0, label: 'ㄨ Skip It' };
if (stars >= 1 && stars <= 3) {
const labels = { 1:'⭐ Solid', 2:'⭐⭐ Worth A Trip', 3:'⭐⭐⭐ Legendary' };
return { num: stars, label: labels[stars] };
}
return null;
}

function extractImage(post) {
try {
const embed = post.embed || post.record?.embed;
if (!embed) return null;
if (embed.images?.length) return embed.images[0].thumb || embed.images[0].fullsize || null;
if (embed.media?.images?.length) return embed.media.images[0].thumb || null;
} catch(e) {}
return null;
}

function buildPostUrl(handle, uri) {
if (!handle || !uri) return '#';
const id = uri.split('/').pop();
return `https://bsky.app/profile/${handle}/post/${id}`;
}

function formatDate(iso) {
if (!iso) return '';
const d = new Date(iso);
return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

function showError(err) {
console.error(err);
document.getElementById('count').textContent = '';
document.getElementById('grid').innerHTML = `
<div class="state">
<div class="state-icon">⚠️</div>
<div class="state-title">Could not load</div>
<div class="state-body">
Could not connect to Bluesky. Check your connection and try again.<br>
<a href="https://bsky.app/hashtag/CBDB" target="_blank" rel="noopener">View #CBDB on Bluesky directly →</a>
</div>
</div>`;
}

function buildCityFilters() {
const cities = [...new Set(ALL_REVIEWS.map(r => r.location))].sort();
const container = document.getElementById('cityFilters');
container.innerHTML = '<button class="chip active" onclick="setCity(\'all\',this)">All Cities</button>';
cities.forEach(city => {
const btn = document.createElement('button');
btn.className = 'chip';
btn.textContent = city;
btn.onclick = () => setCity(city, btn);
container.appendChild(btn);
});
}

function setFilter(val, btn) {
activeFilter = val;
// reset only the rating row's active state (leave Last Year + city chips alone)
btn.parentElement.querySelectorAll('.chip').forEach(b => { if(b.id!=='yearBtn') b.classList.remove('active'); });
btn.classList.add('active');
renderFiltered();
}

function toggleYear(btn) {
yearOnly = !yearOnly;
btn.classList.toggle('active', yearOnly);
renderFiltered();
}

function setCity(val, btn) {
activeCity = val;
document.querySelectorAll('#cityFilters .chip').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
renderFiltered();
}

function renderFiltered() {
const oneYearAgo = new Date();
oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
const list = ALL_REVIEWS.filter(r => {
const rOk = activeFilter === 'all' || String(r.r) === activeFilter;
const cOk = activeCity === 'all' || r.location === activeCity;
const yOk = !yearOnly || (r._ts && new Date(r._ts) >= oneYearAgo);
return rOk && cOk && yOk;
});
render(list);
}

function render(list) {
const grid = document.getElementById('grid');
const count = document.getElementById('count');
if (ALL_REVIEWS.length === 0) {
count.textContent = '';
grid.innerHTML = `
<div class="state">
<div class="state-icon">🍔</div>
<div class="state-title">No reviews yet</div>
<div class="state-body">
Nothing here yet. The database grows one burger at a time.<br><br>
<a href="submit.html">Post the first one →</a>
</div>
</div>`;
return;
}
count.textContent = list.length + ' burger' + (list.length !== 1 ? 's' : '');
if (!list.length) {
grid.innerHTML = `<div class="state"><div class="state-body">No reviews match — try a different filter.</div></div>`;
return;
}
grid.innerHTML = list.map(r => {
const key = RATING_BY_NUM[r.r];
const rt = (typeof RATING!=='undefined' && RATING[key]) ? RATING[key]
: { color: r.r===0?'#6B4A2F':(r.r===1?'#E8843C':(r.r===2?'#FFC72C':'#5BD94B')) };
return `
<div class="card">
<div class="card-img" style="${r.imageUrl?`background-image:url('${r.imageUrl}')`:''}">
${r.imageUrl ? '' : '🍔'}
<div class="card-rating" style="color:${rt.color}; border-color:${rt.color}">${LABEL[r.r]}</div>
</div>
<div class="card-body">
<div class="card-name">${r.restaurant}</div>
<div class="card-loc">${r.location}</div>
<div class="card-snippet">${r.notes}</div>
<div class="card-foot">
<a class="card-handle" href="${r.postUrl}" target="_blank" rel="noopener">@${r.handle}</a>
${r.price ? `<span class="card-price">${r.price}</span>` : ''}
<span class="card-date">${r.date}</span>
</div>
</div>
</div>`;
}).join('');
}

loadDatabaseFeed();
</script>
