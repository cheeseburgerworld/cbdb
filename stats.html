<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats — CB⚡DB</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cbdb-theme.css">
<style>
/* ── CONTRAST TOKENS (Anthropic-style dark, all solid hex) ──
ground var(--ground) · surface var(--surface) · raised var(--raised) · border var(--border)
text var(--text) (AAA) · text-2 var(--text-2) (AA) · text-3 var(--text-3) (meta only)
amber var(--amber) · green var(--presence) · bsky var(--bsky) — accents, not body text */
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body { background:var(--ground); color:var(--text); font-family:'IBM Plex Mono',monospace; line-height:1.6; -webkit-font-smoothing:antialiased; }
/* Top nav */
.nav { position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
background:var(--surface); border-bottom:2px solid var(--amber); padding:12px 20px; }
.nav-left { display:flex; align-items:center; gap:22px; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:2px; color:var(--text); line-height:1; }
.logo .bolt { color:var(--legendary); }
.tabs { display:flex; gap:4px; }
.tab { font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.5px; text-transform:uppercase;
color:var(--text); background:none; border:1px solid transparent; padding:8px 14px; cursor:pointer; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--inset); background:var(--amber); font-weight:600; }
.nav-id { font-size:12px; color:var(--text-2); display:flex; align-items:center; gap:8px; cursor:pointer; }
.nav-id .dot { width:8px; height:8px; border-radius:50%; background:var(--presence); flex-shrink:0; }
.nav-id .dot.out { background:var(--text-3); }
.view { display:none; }
.view.active { display:block; }
/* ── MAP VIEW ── */
#mapView { height:calc(100vh - 55px); }
.map-layout { display:flex; height:100%; position:relative; }
#map { flex:1; background:var(--ground); }
.panel { width:380px; flex-shrink:0; background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; }
.panel-empty { padding:48px 26px; text-align:center; }
.panel-empty .big { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--text-2); letter-spacing:1px; margin-bottom:8px; }
.panel-empty .sub { font-size:13px; color:var(--text-3); }
.review { display:none; }
.review.show { display:block; }
.rv-head { padding:22px 26px 16px; border-bottom:1px solid var(--border); }
.rv-name { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:1px; color:var(--amber); line-height:1; }
.rv-loc { font-size:12px; color:var(--text-2); margin-top:5px; }
.rv-meta { display:flex; gap:12px; margin-top:14px; align-items:center; flex-wrap:wrap; }
.rv-rating { font-size:15px; color:var(--amber); }
.rv-rating .lab { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--text); letter-spacing:1px; margin-left:5px; }
.rv-tier { font-size:14px; color:var(--presence); font-weight:600; }
.rv-style { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--text-2); border:1px solid var(--border); padding:3px 8px; }
.rv-bucket { padding:16px 26px; border-bottom:1px solid var(--raised); }
.rv-bucket-label { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:1.5px; color:var(--presence); margin-bottom:7px; }
.rv-bucket-text { font-size:13px; color:var(--text-2); line-height:1.6; }
.rv-price { font-size:13px; color:var(--text); margin-bottom:7px; }
.rv-price b { color:var(--amber); }
.rv-verdict { padding:16px 26px; font-size:13px; color:var(--text); font-style:italic; border-bottom:1px solid var(--raised); line-height:1.6; }
.rv-by { padding:14px 26px; font-size:11px; color:var(--text-3); letter-spacing:0.5px; }
.rv-by b { color:var(--text-2); }
.cb-pin { width:22px; height:22px; border-radius:50%; border:3px solid var(--ground); box-shadow:0 0 0 1px rgba(0,0,0,0.6), 0 0 10px rgba(0,0,0,0.4); }
.pin-legendary { background:var(--legendary); } .pin-trip { background:var(--rate-worth); } .pin-solid { background:var(--rate-solid); } .pin-skip { background:var(--rate-skip-fill); }
.leaflet-popup-content-wrapper { background:var(--surface); color:var(--text); border:1px solid var(--amber); border-radius:0; font-family:'IBM Plex Mono',monospace; }
.leaflet-popup-content { margin:10px 14px; }
.leaflet-popup-tip { background:var(--amber); }
.pop-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; color:var(--amber); }
.pop-rating { font-size:12px; color:var(--presence); margin-top:2px; }
.pop-cta { font-size:11px; color:var(--text-2); margin-top:4px; text-decoration:underline; }
/* ── SUBMIT VIEW ── */
.submit-wrap { max-width:680px; margin:0 auto; padding:34px 20px 90px; }
h1 { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:1.5px; color:var(--amber); line-height:1; margin-bottom:8px; }
.intro { font-size:13px; color:var(--text-2); margin-bottom:30px; }
/* Signed-out gate — crisp, never dimmed */
.gate { display:flex; flex-direction:column; align-items:center; text-align:center; gap:18px;
border:1px solid var(--border); background:var(--surface); padding:48px 30px; }
.gate-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:1px; color:var(--amber); }
.gate-text { font-size:13px; color:var(--text-2); max-width:380px; line-height:1.65; }
.gate-text b { color:var(--text); }
.signin-btn { background:var(--presence); color:var(--inset); border:none; font-family:'IBM Plex Mono',monospace; font-weight:600;
font-size:14px; padding:13px 22px; cursor:pointer; letter-spacing:0.5px; }
.signin-btn:hover { background:var(--presence-hover); }
.gate-fine { font-size:11px; color:var(--text-3); }
form { display:none; }
form.show { display:block; }
.id-strip { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); padding:12px 16px; margin-bottom:28px; }
.avatar { width:38px; height:38px; border-radius:50%; background:var(--raised); border:1px solid var(--amber); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--amber); flex-shrink:0; }
.id-strip .handle { font-size:13px; color:var(--text); }
.id-strip .role { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--presence); margin-top:3px; }
label.fl { display:block; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-2); margin-bottom:7px; }
label.fl .opt { color:var(--text-3); text-transform:none; letter-spacing:0; }
input[type=text], textarea, select { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text);
font-family:'IBM Plex Mono',monospace; font-size:14px; padding:11px 13px; margin-bottom:16px; }
textarea { resize:vertical; min-height:92px; line-height:1.6; }
input::placeholder, textarea::placeholder { color:var(--text-3); }
input:focus, textarea:focus, select:focus { outline:none; border-color:var(--amber); }
input[type=file] { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text-2); font-family:'IBM Plex Mono',monospace; font-size:13px; padding:10px 13px; margin-bottom:16px; }
input[type=file]::file-selector-button { background:var(--border); color:var(--text); border:none; font-family:'IBM Plex Mono',monospace; font-size:12px; padding:6px 12px; margin-right:12px; cursor:pointer; }
.row { display:flex; gap:14px; } .row > div { flex:1; }
.bucket { margin-bottom:24px; }
.bucket-head { display:flex; align-items:baseline; gap:10px; margin-bottom:6px; }
.bucket-num { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--presence); line-height:1; }
.bucket-label { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; color:var(--text); line-height:1; }
.bucket-hint { font-size:12px; color:var(--text-3); margin:0 0 10px 32px; }
.ratings { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
.rating-opt { border:1px solid var(--border); background:var(--surface); padding:12px; cursor:pointer; text-align:center; transition:border-color .12s, background .12s; }
.rating-opt:hover { border-color:var(--amber); }
.rating-opt.sel { border-color:var(--presence); background:var(--ground-selected); }
.rating-opt .glyph { font-size:16px; color:var(--amber); }
.rating-opt .name { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; color:var(--text); margin-top:4px; }
/* Cross-post + live preview */
.crosspost { border:1px solid var(--border); background:var(--surface); padding:16px; margin:4px 0 18px; }
.cp-head { display:flex; align-items:center; gap:12px; }
.switch { position:relative; width:42px; height:24px; flex-shrink:0; }
.switch input { opacity:0; width:0; height:0; }
.slider { position:absolute; inset:0; background:var(--border); cursor:pointer; transition:.2s; border-radius:24px; }
.slider:before { content:''; position:absolute; height:18px; width:18px; left:3px; top:3px; background:var(--text); transition:.2s; border-radius:50%; }
.switch input:checked + .slider { background:var(--bsky); }
.switch input:checked + .slider:before { transform:translateX(18px); }
.cp-label { font-size:13px; color:var(--text); }
.cp-sub { font-size:11px; color:var(--text-3); margin-top:2px; }
.preview { display:none; margin-top:16px; border-top:1px solid var(--border); padding-top:16px; }
.preview.show { display:block; }
.preview-tag { display:flex; justify-content:space-between; align-items:center; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--bsky); margin-bottom:10px; }
.cc { color:var(--text-3); } .cc.over { color:var(--error); font-weight:600; }
/* The post card — solid dark, full-strength text, no haze */
.bsky-card { background:var(--inset); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
.bsky-top { display:flex; align-items:center; gap:9px; margin-bottom:10px; }
.bsky-av { width:34px; height:34px; border-radius:50%; background:var(--raised); border:1px solid var(--bsky); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:17px; color:var(--bsky); }
.bsky-name { font-size:13px; font-weight:600; color:var(--text); }
.bsky-handle { font-size:12px; color:var(--text-3); }
.bsky-text { font-size:14px; color:var(--text); white-space:pre-line; line-height:1.5; }
.bsky-text .hash { color:var(--bsky); }
.bsky-img { margin-top:11px; border-radius:8px; height:150px; background:var(--raised); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--text-3); font-size:11px; background-size:cover; background-position:center; overflow:hidden; }
.bsky-altrow { display:flex; align-items:center; gap:7px; font-size:10px; color:var(--text-3); margin-top:8px; }
.alt-badge { background:var(--raised); border:1px solid var(--border); padding:2px 6px; letter-spacing:0.5px; color:var(--text-2); }
.alt-badge.warn { color:var(--amber); border-color:var(--amber); }
.submit-btn { width:100%; background:var(--amber); color:var(--inset); border:none; font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; padding:14px; cursor:pointer; margin-top:8px; }
.submit-btn:hover { background:var(--amber-hover); }
.modal-bg { display:none; position:fixed; inset:0; background:rgba(8,6,3,0.9); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-bg.show { display:flex; }
.modal { background:var(--surface); border:2px solid var(--amber); max-width:520px; width:100%; max-height:86vh; overflow-y:auto; padding:28px; }
.modal h2 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:1px; color:var(--amber); margin-bottom:16px; }
.guideline { display:flex; gap:12px; margin-bottom:14px; }
.guideline .mark { color:var(--presence); font-weight:600; flex-shrink:0; }
.guideline .body { font-size:13px; color:var(--text-2); }
.guideline .body strong { color:var(--text); }
.coc { font-size:12px; color:var(--text-3); border-top:1px solid var(--border); padding-top:14px; margin-top:18px; line-height:1.65; }
.agree-btn { width:100%; background:var(--presence); color:var(--inset); border:none; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1.5px; padding:12px; cursor:pointer; margin-top:18px; }
.agree-btn:hover { background:var(--presence-hover); }
.toast { display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ground-selected); border:1px solid var(--presence); color:var(--presence); padding:12px 22px; font-size:13px; z-index:200; }
.toast.show { display:block; }
/* ── DOC VIEWS (Format / About) ── */
.doc-wrap { max-width:720px; margin:0 auto; padding:40px 20px 90px; }
.eyebrow { font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--presence); margin-bottom:12px; }
.doc-lead { font-size:15px; color:var(--text-2); line-height:1.7; margin-bottom:8px; max-width:620px; }
.doc-section { margin-top:42px; padding-top:28px; border-top:1px solid var(--border); }
.doc-head { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1.5px; color:var(--amber); margin-bottom:16px; }
.doc-text { font-size:14px; color:var(--text-2); line-height:1.75; margin-bottom:16px; }
.doc-text b { color:var(--text); } .doc-text i { color:var(--presence); font-style:normal; }
.doc-pull { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:1px; color:var(--text); margin:6px 0 22px; line-height:1.2; }
.doc-fine { font-size:12px; color:var(--text-3); margin-top:14px; line-height:1.6; }
.mono-tag { color:var(--bsky); font-weight:600; }
.rate-row { display:flex; gap:16px; padding:14px 0; border-bottom:1px solid var(--raised); }
.rate-glyph { font-size:18px; min-width:60px; }
.rate-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; margin-bottom:4px; }
.rate-desc { font-size:13px; color:var(--text-2); line-height:1.6; }
.template { background:var(--inset); border:1px solid var(--border); border-radius:6px; padding:18px; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text-2); line-height:1.7; white-space:pre-wrap; }
.template .hash { color:var(--bsky); font-weight:600; }
.spec { width:100%; border-collapse:collapse; margin-top:6px; }
.spec td { padding:9px 10px; border-bottom:1px solid var(--raised); font-size:13px; vertical-align:top; }
.spec .n { color:var(--presence); width:34px; font-weight:600; }
.spec .k { color:var(--text); width:130px; }
.spec .v { color:var(--text-2); }
.principle { display:flex; gap:16px; padding:14px 0; border-bottom:1px solid var(--raised); font-size:14px; color:var(--text-2); line-height:1.65; }
.principle b { color:var(--text); }
.pn { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--amber); min-width:36px; }
.vs { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); margin-bottom:1px; }
.vs-them, .vs-us { padding:14px 16px; font-size:13px; line-height:1.55; }
.vs-them { background:var(--surface); color:var(--text-3); }
.vs-us { background:var(--ground-selected); color:var(--text-2); }
/* ── MAP LEGEND ── */
.legend { position:absolute; bottom:18px; left:18px; z-index:40; background:rgba(33,30,26,0.94); border:1px solid var(--border); padding:11px 13px; }
.legend-title { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-3); margin-bottom:8px; }
.legend-row { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-2); margin-bottom:5px; }
.legend-row:last-child { margin-bottom:0; }
.legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
/* ── DATABASE CARD VIEW ── */
.db-wrap { max-width:1100px; margin:0 auto; padding:34px 20px 90px; }
.db-bar { margin-bottom:24px; }
.db-title { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:1.5px; color:var(--amber); line-height:1; margin-bottom:18px; }
.db-filters { display:flex; gap:8px; flex-wrap:wrap; }
.chip { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-2); background:var(--surface); border:1px solid var(--border); padding:7px 12px; cursor:pointer; }
.chip:hover { border-color:var(--amber); color:var(--text); }
.chip.active { background:var(--amber); color:var(--inset); border-color:var(--amber); font-weight:600; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:18px; }
.card { background:var(--surface); border:1px solid var(--border); overflow:hidden; cursor:pointer; transition:transform .12s, border-color .12s; display:flex; flex-direction:column; }
.card:hover { transform:translateY(-3px); border-color:var(--amber); }
.card-img { width:100%; aspect-ratio:4/3; background:var(--raised); background-size:cover; background-position:center; position:relative; }
.card-rating { position:absolute; top:10px; left:10px; font-size:13px; padding:4px 9px; background:rgba(22,20,15,0.9); border:1px solid; }
.card-body { padding:15px 16px 17px; flex:1; display:flex; flex-direction:column; }
.card-name { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.5px; color:var(--text); line-height:1.05; }
.card-loc { font-size:12px; color:var(--text-2); margin:3px 0 10px; }
.card-meta { display:flex; gap:10px; align-items:center; margin-bottom:11px; }
.card-tier { font-size:13px; color:var(--presence); font-weight:600; }
.card-style { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--text-2); border:1px solid var(--border); padding:2px 7px; }
.card-snippet { font-size:13px; color:var(--text-2); line-height:1.55; flex:1; }
.card-by { font-size:11px; color:var(--text-3); margin-top:12px; }
.card-by b { color:var(--text-2); }
/* ── STATS ── */
.stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:8px; }
.stat-cell { background:var(--surface); border:1px solid var(--border); padding:22px 16px; text-align:center; }
.stat-num { font-family:'Bebas Neue',sans-serif; font-size:48px; color:var(--text); line-height:1; }
.stat-lab { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-2); margin-top:8px; }
.bar-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.bar-lab { font-size:13px; min-width:150px; }
.bar-track { flex:1; height:14px; background:var(--inset); border:1px solid var(--border); overflow:hidden; }
.bar-fill { height:100%; width:0; transition:width .5s; }
.bar-n { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--text); min-width:32px; text-align:right; }
.city-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--raised); }
.city-name { font-size:14px; color:var(--text); flex:0 0 150px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.city-track { flex:1; height:8px; background:var(--inset); }
.city-fill { height:100%; background:var(--amber); }
.city-n { font-size:13px; color:var(--text-2); flex:0 0 28px; text-align:right; }
.lb-sub { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); }
.lb-row { display:flex; align-items:center; gap:14px; padding:13px 14px; border-bottom:1px solid var(--raised); }
.lb-row.top { background:var(--ground-selected); border-left:3px solid var(--presence); }
.lb-rank { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--amber); min-width:36px; }
.lb-row.top .lb-rank { color:var(--presence); }
.lb-av { width:34px; height:34px; border-radius:50%; background:var(--raised); border:1px solid var(--amber); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--amber); }
.lb-handle { flex:1; font-size:13px; color:var(--text); }
.lb-count { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--text); }
.lb-count span { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-3); margin-left:5px; }
/* ── PROFILE DRAWER ── */
@media (max-width:760px) {
.nav { gap:12px; }
.nav-left { gap:14px; min-width:0; flex:1; }
.tabs { overflow-x:auto; -webkit-overflow-scrolling:touch; gap:2px; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex:0 0 auto; white-space:nowrap; padding:8px 11px; }
.nav-id { flex-shrink:0; font-size:11px; }
.footer-inner { flex-direction:column; align-items:flex-start; gap:14px; }

<!-- PROFILE DRAWER (shared) -->
<script src="cbdb-config.js"></script>
<script type="module" src="auth.js"></script>
<script src="auth-bridge.js"></script>
<script src="drawer.js"></script>
<script>
  const state = (window.__cbdb_state = window.__cbdb_state || {signedIn:false,handle:null,displayName:null});

// Restore signed-in nav state across pages (demo uses window; real build reads session)
function paintSignedIn(){ /* handled by auth-bridge.js */ }
paintSignedIn();
function renderStats(){
const total=reviews.length;
const cities=new Set(reviews.map(r=>r.loc)).size;
const byHandle={};
reviews.forEach(r=>{
  if(!byHandle[r.by]) byHandle[r.by]={n:0, avatar:r.byAvatar||''};
  byHandle[r.by].n++;
  if(!byHandle[r.by].avatar && r.byAvatar) byHandle[r.by].avatar=r.byAvatar;
});
const contribs=Object.keys(byHandle).length;
document.getElementById('sTotal').textContent=total;
document.getElementById('sCities').textContent=cities;
document.getElementById('sContribs').textContent=contribs;
document.getElementById('sYear').textContent=total; // demo: all 2026
// by rating
const counts={legendary:0,trip:0,solid:0,skip:0};
reviews.forEach(r=>counts[r.rating]++);
const max=Math.max(...Object.values(counts),1);
const set=(bar,n,key)=>{ document.getElementById(n).textContent=counts[key]; document.getElementById(bar).style.width=(counts[key]/max*100)+'%'; };
set('barLegendary','nLegendary','legendary'); set('barTrip','nTrip','trip');
set('barSolid','nSolid','solid'); set('barSkip','nSkip','skip');
// by city
const byCity={}; reviews.forEach(r=>{ byCity[r.loc]=(byCity[r.loc]||0)+1; });
const cityMax=Math.max(...Object.values(byCity),1);
document.getElementById('cityList').innerHTML=Object.entries(byCity).sort((a,b)=>b[1]-a[1]).map(([c,n])=>
'<div class="city-row"><span class="city-name">'+c+'</span><div class="city-track"><div class="city-fill" style="width:'+(n/cityMax*100)+'%"></div></div><span class="city-n">'+n+'</span></div>').join('');
// leaderboard
const lb=Object.entries(byHandle).sort((a,b)=>b[1].n-a[1].n);
document.getElementById('leaderboard').innerHTML = lb.length ? lb.map(([h,info],i)=>{
  const initial=(h||'?').charAt(0).toUpperCase();
  const av = info.avatar
    ? '<div class="lb-av" style="overflow:hidden;padding:0;"><img src="'+info.avatar+'" alt="" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentNode.textContent=\''+initial+'\'"></div>'
    : '<div class="lb-av">'+initial+'</div>';
  return '<div class="lb-row'+(i===0?' top':'')+'"><span class="lb-rank">'+(i+1)+'</span>'+
    av+
    '<span class="lb-handle">'+h+'</span>'+
    '<span class="lb-count">'+info.n+'<span>burgers</span></span></div>';
}).join('')
: '<div style="color:var(--text-3);font-size:13px;padding:14px 0;">No contributors yet.</div>';
}
(async()=>{ await loadReviews(); renderStats(); })();
</script>
