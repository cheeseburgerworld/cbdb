# CB⚡DB — Netlify configuration

# Serve the OAuth client metadata as JSON
[[headers]]
  for = "/oauth/client-metadata.json"
  [headers.values]
    Content-Type = "application/json"

[build]
  edge_functions = "netlify/functions"

[[edge_functions]]
  path = "/auth/start"
  function = "auth-start"

[[edge_functions]]
  path = "/auth/session"
  function = "auth-session"

[[edge_functions]]
  path = "/auth/proxy"
  function = "auth-proxy"

[[edge_functions]]
  path = "/auth/signout"
  function = "auth-signout"

[[edge_functions]]
  path = "/oauth/callback"
  function = "auth-callback"
